{% extends "base.html" %}
{% block content %}
  <h2>Удалить пост</h2>
  <p>Вы уверены, что хотите удалить пост "{{ post.title }}"?</p>
  <form method="post">{% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'post_detail' post.pk %}" class="btn btn-secondary">Отмена</a>
  </form>
{% endblock %}
