{% extends "base.html" %}
{% block title %}{{ post.title }}{% endblock %}
{% block content %}
  <h2>{{ post.title }}</h2>
  <p>{{ post.content }}</p>
  <p><em>{{ post.created_at }}</em></p>
  <a href="{% url 'post_update' post.pk %}" class="btn btn-warning">Редактировать</a>
  <a href="{% url 'post_delete' post.pk %}" class="btn btn-danger">Удалить</a>
{% endblock %}
