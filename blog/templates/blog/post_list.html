{% extends "base.html" %}
{% block title %}Блог{% endblock %}
{% block content %}
  <h2>Список постов</h2>
  <ul>
    {% for post in posts %}
      <li><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></li>
    {% empty %}
      <li>Нет постов.</li>
    {% endfor %}
  </ul>
  <a href="{% url 'post_create' %}" class="btn btn-primary">Добавить пост</a>
{% endblock %}
