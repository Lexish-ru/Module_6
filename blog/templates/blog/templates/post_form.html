{% extends "base.html" %}
{% block title %}Форма поста{% endblock %}
{% block content %}
  <h2>{% if form.instance.pk %}Редактировать{% else %}Создать{% endif %} пост</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Сохранить</button>
  </form>
{% endblock %}
