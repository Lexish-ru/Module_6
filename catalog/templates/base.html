<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Ретро-Маркет{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-none d-md-block bg-dark text-white min-vh-100">
      <div class="position-sticky pt-3">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link text-white" href="{% url 'home' %}">Главная</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="{% url 'catalog' %}">Каталог</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="{% url 'category_list' %}">Категории</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="{% url 'contacts' %}">Контакты</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="{% url 'messages' %}">Сообщения</a></li>
        </ul>
        <hr>
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link text-white" href="#">Профиль</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">Выход</a></li>
        </ul>
      </div>
    </nav>
    <main class="col-md-10 ms-sm-auto px-4">
      {% block content %}{% endblock %}
    </main>
  </div>
</div>
</body>
</html>
