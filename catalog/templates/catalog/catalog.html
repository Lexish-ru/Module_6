<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Каталог</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-2 d-none d-md-block bg-dark text-white min-vh-100">
      <div class="position-sticky pt-3">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link text-white" href="/">Главная</a></li>
          <li class="nav-item"><a class="nav-link active text-white" href="/catalog/">Каталог</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/category/">Категории</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="/contacts/">Контакты</a></li>
        </ul>
        <hr>
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link text-white" href="#">Профиль</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">Выход</a></li>
        </ul>
      </div>
    </nav>
    <main class="col-md-10 ms-sm-auto px-4">
      <div class="py-4 text-center">
        <h2>Каталог товаров</h2>
      </div>
      <div class="row justify-content-center">
        {% for product in products %}
          <div class="col-md-3 m-3">
            <div class="card text-center h-100">
              {% if product.image %}
                <img src="{{ product.image.url }}" class="card-img-top" alt="{{ product.name }}">
              {% endif %}
              <div class="card-body">
                <h5 class="card-title">{{ product.name }}</h5>
                <p class="card-text">{{ product.description|truncatechars:100 }}</p>
                <a href="{% url 'product_detail' product.pk %}" class="btn btn-outline-primary">Подробнее</a>
              </div>
            </div>
          </div>
        {% endfor %}
      </div>
    </main>
  </div>
</div>
</body>
</html>
