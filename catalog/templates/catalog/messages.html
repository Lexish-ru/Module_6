{% extends 'base.html' %}
{% block title %}Сообщения{% endblock %}
{% block content %}
<div class="py-4 text-center">
  <h2>Сообщения</h2>
</div>
<table class="table table-striped">
  <thead>
    <tr>
      <th>Имя</th>
      <th>Email</th>
      <th>Сообщение</th>
      <th>Дата</th>
    </tr>
  </thead>
  <tbody>
    {% for message in messages %}
    <tr>
      <td>{{ message.name }}</td>
      <td>{{ message.email }}</td>
      <td>{{ message.message|truncatechars:100 }}</td>
      <td>{{ message.created_at }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
