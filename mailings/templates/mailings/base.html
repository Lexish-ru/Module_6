<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %} Сервис рассылок {% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="d-flex justify-content-end align-items-center gap-2 mb-4">
            {% if user.is_authenticated %}
                <span class="me-2">Здравствуйте, {{ user.get_full_name|default:user.email }}</span>
                <a href="{% url 'profile-edit' %}" class="btn btn-outline-primary btn-sm">Профиль</a>
                <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger btn-sm">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">Вход</a>
                <a href="{% url 'register' %}" class="btn btn-outline-success btn-sm">Регистрация</a>
            {% endif %}
        </div>
        <h1 class="mb-4">Сервис рассылок</h1>
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
