{% extends "mailings/base.html" %}
{% block title %}Клиент{% endblock %}
{% block content %}
<h2>{% if object %}Изменить{% else %}Добавить{% endif %} клиента</h2>
<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}{% if field.field.required %}*{% endif %}</label>
            {{ field }}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'client-list' %}" class="btn btn-secondary">Назад</a>
</form>
{% endblock %}
