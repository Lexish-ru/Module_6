{% extends "mailings/base.html" %}
{% block title %}Удалить рассылку{% endblock %}
{% block content %}
<h2>Удалить рассылку?</h2>
<p>Вы уверены, что хотите удалить рассылку {{ object }}?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Удалить</button>
  <a href="{% url 'mailing-list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
