{% extends "mailings/base.html" %}
{% block title %}Восстановление пароля{% endblock %}
{% block content %}
<h2>Восстановление пароля</h2>
<p>Введите e-mail, который вы указывали при регистрации — мы отправим туда ссылку для сброса пароля.</p>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Отправить ссылку</button>
</form>
<a href="{% url 'login' %}">Вернуться ко входу</a>
{% endblock %}
