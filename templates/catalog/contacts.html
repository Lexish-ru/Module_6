<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Контакты</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 d-none d-md-block bg-dark text-white min-vh-100">
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link active text-white" href="#">Главная</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/catalog/">Каталог</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/category/">Категории</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="/contacts/">Контакты</a></li>
          </ul>
           <hr>
          <ul class="nav flex-column">
            <li class="nav-item"><a class="nav-link text-white" href="#">Профиль</a></li>
            <li class="nav-item"><a class="nav-link text-white" href="#">Выход</a></li>
          </ul>
      </nav>

      <main class="col-md-10 ms-sm-auto px-4">
        <div class="py-4 text-center">
          <h2>Контакты</h2>
          <p>Заполните форму, чтобы связаться с нами.</p>
        </div>

        <div class="row justify-content-center">
          <div class="col-md-6">
            <form action="/submit" method="POST">
              <div class="mb-3">
                <label for="name" class="form-label">Имя</label>
                <input type="text" class="form-control" id="name" name="name" required>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Электронная почта</label>
                <input type="email" class="form-control" id="email" name="email" required>
              </div>
              <div class="mb-3">
                <label for="message" class="form-label">Сообщение</label>
                <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary">Отправить</button>
            </form>
          </div>
        </div>

        <div class="row mt-5 justify-content-center">
          <div class="col-md-6 text-center">
            <p><strong>Телефон:</strong> +7 (999) 123-45-67</p>
            <p><strong>Email:</strong> example@mail.com</p>
            <p><strong>Адрес:</strong> г. Москва, ул. Примерная, д. 1</p>
          </div>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
